# Phase 2 analysis parameters
# These control the analysis & figure pipeline (scripts/compute_*, scripts/plot_*)
# Phase 1 (corpus building) parameters live in corpus_filter.yaml and friends.

periodization:
  year_min: 1990
  year_max: 2024
  breaks: [2007, 2015]  # Year boundaries between acts (I→II, II→III)

clustering:
  k: 6                  # Number of KMeans clusters
  cite_threshold: 50    # Minimum cited_by_count for "core" papers

# ── Cluster-free divergence panel (ticket 0026) ──────────────────────────
# compute_divergence.py --method X reads this section via load_analysis_config().
#
# Output contract (one CSV per method, validated by DivergenceSchema):
#   year(int), channel(str), window(str), hyperparams(str?), value(float?)
# Channel is one of: semantic, lexical, citation.
# Window is "2","3","4" or "cumulative" for citation graph methods.

divergence:
  random_seed: 42
  backend: auto        # auto (GPU if available), cpu, cuda
  windows: [2, 3, 4]
  min_papers: 30          # per window minimum (override with 5 for smoke)
  min_papers_smoke: 5     # auto-detected when n_works < 200
  max_subsample: 2000     # cap per side for O(n²) methods
  equal_n: true            # subsample both windows to min(n_before, n_after)
  pelt_penalties: [1, 3, 5]
  pelt_model: rbf
  pelt_min_size: 2

  permutation:
    n_perm: 500
    z_threshold: 2.0    # consumed by compute_transition_zones.py (ticket 0055b)

  bootstrap:
    k: 200               # replicates for estimation CIs (ticket 0047, opt-in)
    citation_subsample_fraction: 0.8   # graph methods use subsampling-without-replacement
                                       # at this fraction (Politis & Romano), not nonparametric
                                       # bootstrap — duplicating nodes is ill-defined for
                                       # spectral / community statistics. Ticket 0069.

  c2st:
    pca_dim: 32
    cv_folds: 5
    class_weight: balanced

  semantic:
    S1_MMD:
      bandwidth_multipliers: [0.5, 1.0, 2.0]   # × median heuristic
    S2_energy: {}                                # no hyperparams
    S3_sliced_wasserstein:
      n_projections: [100, 500, 1000]
    S4_frechet:
      max_dim: 256                               # PCA reduce before Fréchet (covariance stability + speed)

  lexical:
    tfidf_max_features: 5000
    tfidf_min_df: 3
    L1_js: {}                                    # uses shared windows
    L2_novelty:
      windows: [3, 5]                            # past/future window
    L3_bursts:
      top_n_terms: 100
      z_threshold: 2.0

  citation:
    G1_pagerank:
      damping: 0.85
      n_bins: 20                                   # histogram bins for JS divergence on PR distributions
    G2_spectral: {}
    G3_coupling_age: {}
    G4_cross_tradition:
      n_communities: 2                           # spectral bisection
    G5_pref_attachment: {}
    G6_entropy: {}
    G7_disruption: {}
    G8_betweenness:
      max_nodes: 500                             # subsample for tractability
    G9_community:
      resolution: 1.0

# ── Companion paper figures (ticket 0058) ────────────────────────────────
# Figure geometry, colours, and thresholds for the four canonical figures
# rendered by scripts/plot_companion_*.py.  Isolated here so plotting
# choices can evolve without touching the compute layer.
companion:
  random_seed: 42
  lead_window: 3              # preferred half-width for Figure 1 / Figure 2
  year_min: 1998
  year_max: 2021
  z_threshold: 2.0            # significance threshold for Z-score layers
  auc_chance: 0.5             # chance level for C2ST AUC reference
  auc_scale: 20.0             # (AUC - 0.5) * auc_scale yields comparable signal
  validated_zone_min_methods: 2
  methods:                    # method_id: display label (used in heatmap rows)
    S2_energy: "S2 Energy"
    L1: "L1 JS"
    G9_community: "G9 Community"
    G2_spectral: "G2 Spectral"
    C2ST_embedding: "C2ST emb"
    C2ST_lexical: "C2ST lex"
  colors:
    z_cmap: "RdBu_r"          # diverging colormap for Z-score heatmap
    zone_edge: "#222222"
    series:
      S2_energy: "#1f77b4"
      L1: "#ff7f0e"
      G9_community: "#2ca02c"
      G2_spectral: "#9467bd"
      C2ST_embedding: "#d62728"
      C2ST_lexical: "#8c564b"
  top_terms: 10               # Figure 3: bars per zone
  stub_figure_todo: "t0064"   # ticket id annotated on stub fallbacks
