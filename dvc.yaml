# DVC pipeline — Phase 1: Corpus Building
#
# Mirrors Makefile Phase 1a–1f. Run with:
#   dvc repro              (full pipeline)
#   dvc repro discover     (single stage)
#
# NOTE: discover/enrich stages involve API calls and may take hours.
# Do not run casually — use `dvc repro --dry` to preview what would run.

stages:
  # Phase 1a-pre: Parse bibCNRS RIS exports → bibcnrs_works.csv
  # Hand-exported from bib.cnrs.fr (CNRS credentials required); conversion is
  # deterministic so it lives in the pipeline rather than as a pre-placed artifact.
  catalog_bibcnrs:
    cmd: uv run python scripts/catalog_bibcnrs.py
    deps:
      - scripts/catalog_bibcnrs.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/exports
    outs:
      - data/catalogs/bibcnrs_works.csv

  # ── Phase 1a: Discovery ──────────────────────────────────
  # Independent per-source stages → catalog_merge.
  # DVC runs independent stages in parallel and skips unchanged ones.

  catalog_istex:
    cmd: uv run python scripts/catalog_istex.py --api
    deps:
      - scripts/catalog_istex.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - config/corpus_collect.yaml
      - data/pool/istex
    outs:
      - data/catalogs/istex_works.csv
      - data/catalogs/istex_refs.csv

  catalog_openalex:
    cmd: uv run python scripts/catalog_openalex.py --resume
    deps:
      - scripts/catalog_openalex.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - config/openalex_queries.yaml
      - config/corpus_collect.yaml
      - data/pool/openalex
    outs:
      - data/catalogs/openalex_works.csv
      - data/catalogs/openalex_citations.csv

  # catalog_s2: disconnected — keyword search on S2 is ineffective
  # (wrong endpoint, no phrase matching, 1000-result cap, 2M noise results).
  # Pool data preserved in data/pool/semanticscholar/ for future
  # citation-graph-based harvest. See ticket for redesign.

  catalog_grey:
    cmd: uv run python scripts/catalog_grey.py
    deps:
      - scripts/catalog_grey.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - config/grey_sources.yaml
      - config/corpus_collect.yaml
    outs:
      - data/catalogs/grey_works.csv

  catalog_teaching:
    cmd: >-
      uv run python scripts/build_teaching_yaml.py &&
      uv run python scripts/build_teaching_canon.py
    deps:
      - scripts/build_teaching_yaml.py
      - scripts/build_teaching_canon.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/syllabi
    outs:
      - data/catalogs/teaching_works.csv

  # Merge all per-source CSVs → unified_works.csv
  catalog_merge:
    cmd: uv run python scripts/catalog_merge.py
    deps:
      - scripts/catalog_merge.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/bibcnrs_works.csv
      - data/catalogs/istex_works.csv
      - data/catalogs/openalex_works.csv
      - data/catalogs/grey_works.csv
      - data/catalogs/teaching_works.csv
      # Hand-curated input (pre-placed, not produced by pipeline)
      - data/catalogs/scispace_works.csv
    outs:
      - data/catalogs/unified_works.csv

  # ── Phase 1b: Enrichment pipeline ──────────────────────────
  # Split into independent DVC stages so each step is cached separately.
  # A failure in a late step (e.g. embeddings) won't force re-running
  # earlier steps (e.g. citations) on retry.

  # Phase 1b.1: Resolve missing DOIs + fill abstracts + fill language → enriched_works.csv
  # All three modify enriched_works.csv in-place. Splitting into separate stages
  # would cause a DVC rerun loop (in-place modification changes the tracked
  # output hash, triggering false staleness). See #427 for design discussion.
  # Language runs last because detection benefits from filled abstracts.
  enrich_works:
    cmd: >-
      uv run python scripts/enrich_dois.py --works-input data/catalogs/unified_works.csv --works-output data/catalogs/enriched_works.csv &&
      uv run python scripts/enrich_abstracts.py --works-input data/catalogs/enriched_works.csv &&
      uv run python scripts/enrich_language.py --works-input data/catalogs/enriched_works.csv
    deps:
      - scripts/enrich_dois.py
      - scripts/enrich_abstracts.py
      - scripts/enrich_language.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/unified_works.csv
    outs:
      - data/catalogs/enriched_works.csv

  # Phase 1b.3: Build citation graph (OpenAlex referenced_works only)
  # Crossref batch pass disabled: without metadata-plus subscription,
  # Crossref returns 0 references (empty reference arrays). OpenAlex
  # referenced_works is free and complete. See enrich_citations_batch.py
  # for the Crossref code if access is restored.
  enrich_citations:
    cmd: >-
      uv run python scripts/enrich_citations_openalex.py --works-input data/catalogs/enriched_works.csv
    deps:
      - scripts/enrich_citations_openalex.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/enriched_works.csv
    outs:
      - data/catalogs/citations.csv

  # Phase 1b.4: Citation QC — verify against Crossref ground truth
  qa_citations:
    cmd: uv run python scripts/qa_citations.py --works-input data/catalogs/enriched_works.csv
    deps:
      - scripts/qa_citations.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/enriched_works.csv
      - data/catalogs/citations.csv

  # Phase 1b.5: Sentence embeddings (encoding only — no UMAP/clustering)
  # Requires uv sync --group corpus --extra cpu (or --extra cu130 on GPU)
  enrich_embeddings:
    cmd: uv run python scripts/enrich_embeddings.py --works-input data/catalogs/enriched_works.csv
    deps:
      - scripts/enrich_embeddings.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/enriched_works.csv
    outs:
      - data/catalogs/embeddings.npz

  # Phase 1c: Extend → extended_works.csv
  # Adds diagnostic flags and protection columns; no rows removed.
  # corpus_filter.py loads config/corpus_filter.yaml via filter_flags.py.
  extend:
    cmd: >-
      uv run python scripts/corpus_filter.py --extend --works-input data/catalogs/enriched_works.csv --works-output data/catalogs/extended_works.csv
    deps:
      - scripts/corpus_filter.py
      - scripts/filter_flags.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - config/corpus_filter.yaml
      - data/catalogs/enriched_works.csv
    outs:
      - data/catalogs/extended_works.csv

  # Phase 1d: Filter → refined_works.csv + corpus_audit.csv
  # Applies keep/remove policy based on flags set in extend stage.
  # Also loads config/corpus_filter.yaml for retention policy parameters.
  filter:
    cmd: >-
      uv run python scripts/corpus_filter.py --filter --works-input data/catalogs/extended_works.csv --works-output data/catalogs/refined_works.csv
    deps:
      - scripts/corpus_filter.py
      - scripts/filter_flags.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - config/corpus_filter.yaml
      - config/v1_identifiers.txt.gz
      - data/catalogs/extended_works.csv
    outs:
      - data/catalogs/refined_works.csv
      - data/catalogs/corpus_audit.csv

  # Phase 1e: Align → refined_embeddings.npz + refined_citations.csv
  # Produces row-aligned Phase 2 contract artifacts:
  #   refined_embeddings.npz[vectors][i] ↔ refined_works.csv row i
  #   refined_citations.csv edges restricted to refined DOIs
  align:
    cmd: uv run python scripts/corpus_align.py
    deps:
      - scripts/corpus_align.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/refined_works.csv
      - data/catalogs/embeddings.npz
      - data/catalogs/citations.csv
    outs:
      - data/catalogs/refined_embeddings.npz
      - data/catalogs/refined_citations.csv

  # Phase 2: Semantic landscape analysis (UMAP + KMeans clustering)
  # Loads pre-computed embeddings.npz, produces UMAP projections and clusters.
  # Not in the Phase 1 critical path — can run independently after embeddings exist.
  analyze_embeddings:
    cmd: uv run python scripts/analyze_embeddings.py --works-input data/catalogs/enriched_works.csv
    deps:
      - scripts/analyze_embeddings.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/enriched_works.csv
      - data/catalogs/embeddings.npz
    outs:
      - data/catalogs/semantic_clusters.csv

